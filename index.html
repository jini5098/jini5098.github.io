<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Workspace</title>
    
    <meta name="naver-site-verification" content="95180f83de52241df513d9f693dcf3067ab441b8" />

    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #fefce8; /* 앱 배경색과 동일한 연한 노란색 */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: #0f172a;
        }

        /* 빙글빙글 도는 로딩 애니메이션 */
        .spinner {
            width: 60px;
            height: 60px;
            border: 6px solid #fef08a; /* 연한 테두리 */
            border-top: 6px solid #facc15; /* 진한 노란색 포인트 */
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 24px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 18px;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .loading-subtext {
            font-size: 14px;
            color: #64748b;
        }
    </style>
</head>
<body>

    <div class="spinner"></div>
    <div class="loading-text">Live Workspace 준비 중...</div>
    <div class="loading-subtext">잠시만 기다려주세요</div>

    <script>
        // 3.5초(3500 밀리초) 동안 로딩 화면을 보여준 뒤 Canvas 앱으로 이동
        setTimeout(function() {
            window.location.href = "https://jini5098.github.io/Canvas/";
        }, 3500);
    </script>
</body>
</html>
